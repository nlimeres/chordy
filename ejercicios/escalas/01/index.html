<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chordy - Ejercicios Escalas</title>
    <script src="https://cdn.jsdelivr.net/npm/vexflow@4.2.2/build/cjs/vexflow.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .grid { display: flex; flex-direction: column; gap: 40px; width: 100%; max-width: 1000px; }
        
        .card { 
            background: white; border-radius: 15px; padding: 25px; border: 3px solid #eee;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            display: flex; flex-direction: column; align-items: center;
        }
        
        .canvas-container { width: 100%; height: 160px; overflow-x: auto; }
        
        .inputs { display: flex; gap: 20px; width: 100%; max-width: 600px; margin-top: 20px; }
        select { flex: 1; padding: 12px; border-radius: 8px; border: 2px solid #ccc; font-size: 16px; background: white; }

        .card-success { border-color: #2ecc71 !important; background-color: #fafffa; }
        .card-error { border-color: #e74c3c !important; background-color: #fffafa; }
        .sel-correct { border-color: #2ecc71 !important; }
        .sel-wrong { border-color: #e74c3c !important; }

        #btn-check { 
            margin: 50px; padding: 20px 80px; font-size: 1.3em; font-weight: bold;
            background: #2c3e50; color: white; border: none; border-radius: 50px; cursor: pointer;
            transition: transform 0.2s;
        }
        #btn-check:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <h1>Identificación de Escalas</h1>
    <p>Nivel 🟢 <br> Escalas mayores y menores <b>naturales</b> sin armadura.</p>
    
    <div id="exercise-grid" class="grid"></div>

    <button id="btn-check">Comprobar Respuestas</button>

        <div style="width: 100%; max-width: 1000px; display: flex; justify-content: space-between; align-items: center; margin-top: 20px;">

            🏠
        </button>

        <button onclick="window.location.href='/ejercicios/escalas/02/index.html'" style="padding: 15px 40px; font-size: 1.1em; font-weight: bold; background: #2c3e50; color: white; border: none; border-radius: 50px; cursor: pointer; text-align: center;">
            ➡️ <br>siguiente ejercicio
        </button>

    </div>

    <script src="script.js"></script>
</body>
</html>
