<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicios de Escalas</title>
    <script src="https://cdn.jsdelivr.net/npm/vexflow@4.2.2/build/cjs/vexflow.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .grid { width: 100%; max-width: 900px; display: flex; flex-direction: column; gap: 40px; }
        .card { 
            background: white; border-radius: 12px; padding: 25px; border: 4px solid #eee;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .canvas-container { width: 100%; height: 140px; }
        .inputs { display: flex; gap: 15px; margin-top: 20px; justify-content: center; }
        select { padding: 12px; border-radius: 8px; border: 2px solid #ccc; font-size: 16px; width: 200px; }

        .card-success { border-color: #2ecc71 !important; background-color: #fafffa; }
        .card-error { border-color: #e74c3c !important; background-color: #fffafa; }
        .sel-correct { border-color: #2ecc71 !important; background-color: #e8f8f0 !important; }
        .sel-wrong { border-color: #e74c3c !important; background-color: #fdedec !important; }

        #btn-check { 
            margin-top: 40px; padding: 20px 60px; font-size: 1.3em; font-weight: bold;
            background: #2c3e50; color: white; border: none; border-radius: 50px; cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>Identifica las Escalas</h1>
    <p>Nivel 🟢 <br> Escalas mayores y menores <b>con armadura</b>.</p>
    
    <div id="exercise-grid" class="grid"></div>

    <button id="btn-check">Comprobar Respuestas</button>

 <div style="width: 100%; max-width: 1000px; display: flex; justify-content: space-between; align-items: center; margin-top: 20px;">
        
       <button onclick="window.location.href='/ejercicios/escalas/01/index.html'" style="padding: 15px 40px; font-size: 1.1em; font-weight: bold; background: #2c3e50; color: white; border: none; border-radius: 50px; cursor: pointer; text-align: center;">
            ⬅️ <br>anterior ejercicio
        </button>

        <button onclick="window.location.href='pages/ejercicios/escalas/index.html'" style="padding: 15px 40px; font-size: 1.1em; font-weight: bold; background: #2c3e50; color: white; border: none; border-radius: 50px; cursor: pointer; text-align: center;">
            🏠
        </button>

        <button onclick="window.location.href='/ejercicios/escalas/03/index.html'" style="padding: 15px 40px; font-size: 1.1em; font-weight: bold; background: #2c3e50; color: white; border: none; border-radius: 50px; cursor: pointer; text-align: center;">
            ➡️ <br>siguiente ejercicio
        </button>

    </div>

    <script src="script.js"></script>
</body>
</html>
