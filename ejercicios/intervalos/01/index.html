<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chordy - Ejercicios Intervalos (01)</title>
    <script src="https://cdn.jsdelivr.net/npm/vexflow@4.2.2/build/cjs/vexflow.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; width: 100%; max-width: 1000px; }
        .card { 
            background: white; border-radius: 12px; padding: 15px; border: 3px solid #eee;
            transition: all 0.3s; display: flex; flex-direction: column; align-items: center;
        }
        .canvas-container { width: 150px; height: 120px; }
        .inputs { display: flex; gap: 5px; width: 100%; margin-top: 10px; }
        select { flex: 1; padding: 8px; border-radius: 6px; border: 2px solid #ccc; font-size: 13px; }

        .card-success { border-color: #2ecc71 !important; background-color: #fafffa; }
        .card-error { border-color: #e74c3c !important; background-color: #fffafa; }
        .sel-correct { border-color: #2ecc71 !important; background-color: #e8f8f0 !important; }
        .sel-wrong { border-color: #e74c3c !important; background-color: #fdedec !important; }

        #btn-check { 
            margin: 40px; padding: 15px 40px; font-size: 1.1em; font-weight: bold;
            background: #2c3e50; color: white; border: none; border-radius: 50px; cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>Intervalos Mayores y Menores</h1>
    <p>Nivel 🟢 <br>Iniciación a los intervalos musicales. Segundas y Terceras mayores y menores</p>
    
    <div id="exercise-grid" class="grid"></div>

    <button id="btn-check">Comprobar Respuestas</button>

    <div style="width: 100%; max-width: 1000px; display: flex; justify-content: space-between; align-items: center; margin-top: 20px;">
        
       <!-- <button onclick="window.location.href='anterior.html'" style="padding: 15px 40px; font-size: 1.1em; font-weight: bold; background: #2c3e50; color: white; border: none; border-radius: 50px; cursor: pointer; text-align: center;">
            ⬅️ <br>anterior ejercicio
        </button>       (es el primero, no hay un ejercicio anterior)-->

        <button onclick="window.location.href='/pages/ejercicios/intervalos/index.html'" style="padding: 15px 40px; font-size: 1.1em; font-weight: bold; background: #2c3e50; color: white; border: none; border-radius: 50px; cursor: pointer; text-align: center;">
            🏠
        </button>

        <button onclick="window.location.href='/pages/ejercicios/intervalos/02/index.html'" style="padding: 15px 40px; font-size: 1.1em; font-weight: bold; background: #2c3e50; color: white; border: none; border-radius: 50px; cursor: pointer; text-align: center;">
            ➡️ <br>siguiente ejercicio
        </button>

    </div>

    <script src="script.js"></script>
</body>
</html>
