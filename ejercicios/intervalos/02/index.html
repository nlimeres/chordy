<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chordy - Ejercicios de Intervalos</title>
    <script src="https://cdn.jsdelivr.net/npm/vexflow@4.2.2/build/cjs/vexflow.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); 
            gap: 20px; width: 100%; max-width: 1100px; 
        }
        .card { 
            background: white; border-radius: 12px; padding: 15px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 3px solid #eee;
            transition: all 0.3s ease; display: flex; flex-direction: column; align-items: center;
        }
        .canvas-container { width: 180px; height: 120px; }
        .inputs { display: flex; gap: 8px; width: 100%; margin-top: 15px; }
        
        select { 
            flex: 1; padding: 10px; border-radius: 6px; border: 2px solid #ccc; 
            font-size: 14px; cursor: pointer; background: #fff; transition: all 0.2s;
        }

        .card-success { border-color: #2ecc71 !important; background-color: #fafffa; }
        .card-error { border-color: #e74c3c !important; background-color: #fffafa; }

        .select-correct { border-color: #2ecc71 !important; background-color: #e8f8f0 !important; }
        .select-wrong { border-color: #e74c3c !important; background-color: #fdedec !important; }

        #btn-check { 
            margin: 40px 0; padding: 18px 50px; font-size: 1.1em; font-weight: bold;
            background: #2c3e50; color: white; border: none; border-radius: 50px; cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        #btn-check:hover { background: #34495e; transform: translateY(-2px); }
    </style>
</head>
<body>

    <h1>Identificación de Intervalos</h1>
    <p>exercise test nº2</p>

    <div id="exercise-grid" class="grid"></div>
    
    <button id="btn-check">Corregir Ejercicios</button>

    <script src="script.js"></script>
</body>
</html>
