    <title>Ejercicio: Solo Mayores y Menores</title>
    <script src="https://cdn.jsdelivr.net/npm/vexflow@4.2.2/build/cjs/vexflow.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; width: 100%; max-width: 1000px; }
        .card { 
            background: white; border-radius: 12px; padding: 15px; border: 3px solid #eee;
            transition: all 0.3s; display: flex; flex-direction: column; align-items: center;
        }
        .canvas-container { width: 150px; height: 120px; }
        .inputs { display: flex; gap: 5px; width: 100%; margin-top: 10px; }
        select { flex: 1; padding: 8px; border-radius: 6px; border: 2px solid #ccc; font-size: 13px; }

        .card-success { border-color: #2ecc71 !important; background-color: #fafffa; }
        .card-error { border-color: #e74c3c !important; background-color: #fffafa; }
        .sel-correct { border-color: #2ecc71 !important; background-color: #e8f8f0 !important; }
        .sel-wrong { border-color: #e74c3c !important; background-color: #fdedec !important; }

        #btn-check { 
            margin: 40px; padding: 15px 40px; font-size: 1.1em; font-weight: bold;
            background: #2c3e50; color: white; border: none; border-radius: 50px; cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>Intervalos Mayores y Menores</h1>
    <p>Nivel 🟢</p>
    <p>Iniciación a los intervalos musicales. Aparecen los intervalos Disminuidos y Justos</p>

<style>
  .custom-select {
    width: 250px;
    position: relative;
    font-family: sans-serif;
  }
.custom-select {
    width: 250px;
    position: fixed;
    left: 0;
    top: 0;
    z-index: 9999;
    font-family: sans-serif;
    background: #ffffff;
    border: 1px solid #e0e0e0;
    border-radius: 6px;
    box-shadow: 0 6px 14px rgba(0,0,0,0.08);
}

  .custom-select summary::after {
    content: '▼';
    font-size: 0.8em;
  }
  .custom-select[open] summary::after {
    content: '▲';
  }
  .custom-select .options {
    border: 1px solid #ccc;
    border-top: none;
    background-color: white;
    position: absolute;
    width: 100%;
    z-index: 10;
    box-sizing: border-box;
    border-bottom-left-radius: 5px;
    border-bottom-right-radius: 5px;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
  }

  .custom-select .options a {
    display: block;
    padding: 10px;
    text-decoration: none;
    color: #333;
  }

  .custom-select .options a:hover {
    background-color: #f0f0f0;
  }
</style>
</head>
<body>

<details class="custom-select">

</details>
